<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索地理·分组大挑战</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 引入 Lucide 图标 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-10px);
            }

            80% {
                transform: translateX(10px);
            }
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border-color: #ef4444 !important;
            background-color: rgba(239, 68, 68, 0.2) !important;
        }

        .bg-stars {
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px);
            background-size: 150px 150px;
            background-position: 0 0, 75px 75px;
        }

        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 游戏数据池 ---
        const GEOGRAPHY_DATA = [
            { groupId: 'g1', groupName: '北京景点', items: ['故宫', '天坛', '颐和园'] },
            { groupId: 'g2', groupName: '陕西景点', items: ['兵马俑', '大雁塔', '华清池'] },
            { groupId: 'g3', groupName: '法国景点', items: ['埃菲尔铁塔', '卢浮宫', '凡尔赛宫'] },
            { groupId: 'g4', groupName: '意大利景点', items: ['古罗马斗兽场', '威尼斯水城', '比萨斜塔'] },
            { groupId: 'g5', groupName: '英国景点', items: ['大本钟', '巨石阵', '白金汉宫'] },
            { groupId: 'g6', groupName: '美国景点', items: ['自由女神像', '黄石公园', '科罗拉多大峡谷'] },
            { groupId: 'g7', groupName: '澳大利亚景点', items: ['悉尼歌剧院', '大堡礁', '乌鲁鲁巨石'] },
            { groupId: 'g8', groupName: '埃及景点', items: ['吉萨金字塔', '狮身人面像', '卡纳克神庙'] },
            { groupId: 'g9', groupName: '印度景点', items: ['泰姬陵', '恒河', '琥珀堡'] },
            { groupId: 'g10', groupName: '日本景点', items: ['富士山', '浅草寺', '清水寺'] },
            { groupId: 'g11', groupName: '俄罗斯景点', items: ['克里姆林宫', '冬宫', '贝加尔湖'] },
            { groupId: 'g12', groupName: '巴西景点', items: ['基督像', '亚马逊雨林', '伊瓜苏瀑布'] },
            { groupId: 'g13', groupName: '中国名山', items: ['泰山', '黄山', '华山'] },
            { groupId: 'g14', groupName: '中国名水', items: ['长江三峡', '桂林山水', '杭州西湖'] },
            { groupId: 'g15', groupName: '四川景点', items: ['九寨沟', '峨眉山', '都江堰'] },
            { groupId: 'g16', groupName: '西藏景点', items: ['布达拉宫', '大昭寺', '纳木错'] },
            { groupId: 'g17', groupName: '湖南景点', items: ['张家界', '凤凰古城', '橘子洲头'] },
        ];

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        // 简易图标组件，因为 HTML 环境下直接使用 Lucide React 组件需要更复杂的配置
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [score, setScore] = useState(0);
            const [availableItems, setAvailableItems] = useState([]);
            const [boxes, setBoxes] = useState([
                { id: 0, groupId: null, groupName: null, items: [] },
                { id: 1, groupId: null, groupName: null, items: [] },
                { id: 2, groupId: null, groupName: null, items: [] },
            ]);
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [errorBoxId, setErrorBoxId] = useState(null);

            const startNewRound = useCallback(() => {
                const shuffledGroups = shuffleArray(GEOGRAPHY_DATA).slice(0, 4);
                let newItems = [];
                shuffledGroups.forEach(group => {
                    group.items.forEach(itemName => {
                        newItems.push({
                            id: `${group.groupId}-${itemName}-${Math.random()}`,
                            groupId: group.groupId,
                            groupName: group.groupName,
                            name: itemName
                        });
                    });
                });
                setAvailableItems(shuffleArray(newItems));
                setBoxes([
                    { id: 0, groupId: null, groupName: null, items: [] },
                    { id: 1, groupId: null, groupName: null, items: [] },
                    { id: 2, groupId: null, groupName: null, items: [] },
                ]);
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const startGame = () => {
                setScore(0);
                setGameState('playing');
                startNewRound();
            };

            useEffect(() => {
                if (gameState !== 'playing') return;
                if (score >= 5) {
                    setTimeout(() => setGameState('won'), 500);
                    return;
                }
                const isRoundComplete = boxes.every(box => box.items.length === 3);
                if (isRoundComplete && score < 5) {
                    const timer = setTimeout(() => startNewRound(), 1500);
                    return () => clearTimeout(timer);
                }
            }, [boxes, score, gameState, startNewRound]);

            const handleItemPlacement = (item, targetBoxId) => {
                let success = false;
                setBoxes(prevBoxes => {
                    const newBoxes = [...prevBoxes];
                    const boxIndex = newBoxes.findIndex(b => b.id === targetBoxId);
                    const box = newBoxes[boxIndex];

                    if (box.items.length >= 3) return prevBoxes;

                    if (box.items.length === 0) {
                        newBoxes[boxIndex] = { ...box, groupId: item.groupId, groupName: item.groupName, items: [item] };
                        setAvailableItems(prev => prev.filter(i => i.id !== item.id));
                        success = true;
                        return newBoxes;
                    }

                    if (box.groupId === item.groupId) {
                        const updatedItems = [...box.items, item];
                        newBoxes[boxIndex] = { ...box, items: updatedItems };
                        setAvailableItems(prev => prev.filter(i => i.id !== item.id));
                        if (updatedItems.length === 3) setScore(s => s + 1);
                        success = true;
                        return newBoxes;
                    } else {
                        setErrorBoxId(targetBoxId);
                        setTimeout(() => setErrorBoxId(null), 600);
                        return prevBoxes;
                    }
                });
                setSelectedItemId(null);
            };

            const handleDragStart = (e, item) => {
                e.dataTransfer.setData('itemId', item.id);
                setSelectedItemId(item.id);
            };

            const handleDrop = (e, boxId) => {
                e.preventDefault();
                const itemId = e.dataTransfer.getData('itemId');
                const item = availableItems.find(i => i.id === itemId);
                if (item) handleItemPlacement(item, boxId);
            };

            return (
                <div className="relative w-full h-screen overflow-hidden select-none bg-gradient-to-br from-[#0b1a4a] via-[#103070] to-[#1a4a9c] text-white flex flex-col">
                    <div className="absolute inset-0 bg-stars opacity-30 pointer-events-none"></div>

                    {gameState === 'start' && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/40 backdrop-blur-sm">
                            <div className="bg-gradient-to-b from-[#103070] to-[#0b1a4a] p-12 rounded-3xl border-4 border-blue-400 shadow-[0_0_60px_rgba(0,180,255,0.6)] text-center max-w-2xl">
                                <h1 className="text-5xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">探索地理·分组大挑战</h1>
                                <p className="text-lg text-blue-100 mb-12">
                                    1. 每次右侧给出 12 个地理位置。<br/>
                                    2. 将同类别的 3 个景点拖入同一个框内。<br/>
                                    3. 第一个进入的景点决定该框的分类。<br/>
                                    4. 累计拼出 5 组即可通关！
                                </p>
                                <button onClick={startGame} className="flex items-center gap-2 mx-auto px-10 py-4 bg-yellow-400 text-[#0b1a4a] font-bold text-2xl rounded-full shadow-lg hover:scale-105 transition-transform">
                                    开始挑战
                                </button>
                            </div>
                        </div>
                    )}

                    {gameState !== 'start' && (
                        <>
                            <div className="relative z-10 flex items-center justify-between px-6 py-4">
                                <h1 className="text-2xl font-bold tracking-widest">旅游分类</h1>
                                <div className="absolute left-1/2 -translate-x-1/2 top-0 bg-[#0a1b4a]/80 px-8 py-3 rounded-b-2xl border border-yellow-500/50 flex flex-col items-center">
                                    <div className="text-xs text-blue-300">▶ 找出同类景点并组合 (目标: 5组)</div>
                                    <div className="flex gap-2 mt-1">
                                        {[1, 2, 3, 4, 5].map(step => (
                                            <div key={step} className={`w-10 h-2 rounded-full transition-all ${score >= step ? 'bg-green-400 shadow-sm' : 'bg-blue-900/50 border border-blue-700'}`}></div>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={startNewRound} className="flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-full border border-white/20 text-sm">
                                    换一批
                                </button>
                            </div>

                            <div className="flex-1 flex w-full max-w-7xl mx-auto z-10 relative mt-8 pb-8 px-4">
                                <div className="w-1/3 flex flex-col justify-between gap-6 pr-8">
                                    {boxes.map(box => {
                                        const isFull = box.items.length === 3;
                                        const isEmpty = box.items.length === 0;
                                        return (
                                            <div key={box.id}
                                                 onClick={() => selectedItemId && handleItemPlacement(availableItems.find(i=>i.id===selectedItemId), box.id)}
                                                 onDragOver={(e)=>e.preventDefault()}
                                                 onDrop={(e)=>handleDrop(e, box.id)}
                                                 className={`relative flex-1 rounded-2xl border-4 transition-all flex flex-col overflow-hidden ${errorBoxId === box.id ? 'animate-shake' : ''} ${isFull ? 'border-green-400 bg-green-900/40' : isEmpty ? 'border-dashed border-white/30 bg-white/5' : 'border-blue-400 bg-blue-900/30'}`}>
                                                <div className="py-1 px-4 bg-black/20 text-xs font-bold flex justify-between">
                                                    <span>{isEmpty ? '等待...' : box.groupName}</span>
                                                    <span>{box.items.length}/3</span>
                                                </div>
                                                <div className="flex-1 p-3 flex flex-col gap-2 justify-center">
                                                    {box.items.map((item, idx) => (
                                                        <div key={idx} className="py-2 px-4 rounded-lg text-center font-bold bg-blue-500 text-sm">{item.name}</div>
                                                    ))}
                                                </div>
                                                {isFull && <div className="absolute inset-0 flex items-center justify-center bg-green-500/20"><Icon name="check" size={48} className="text-green-400" /></div>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="w-2/3 grid grid-cols-3 gap-4 content-start bg-black/20 p-6 rounded-3xl border border-white/10">
                                    {availableItems.map(item => (
                                        <div key={item.id} draggable onDragStart={(e)=>handleDragStart(e, item)}
                                             onClick={()=>setSelectedItemId(item.id === selectedItemId ? null : item.id)}
                                             className={`px-4 py-5 rounded-xl font-bold text-lg text-center cursor-pointer transition-all ${selectedItemId === item.id ? 'bg-yellow-200 text-blue-900 border-4 border-yellow-500 scale-105' : 'bg-white text-blue-900 shadow hover:-translate-y-1'}`}>
                                            {item.name}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </>
                    )}

                    {gameState === 'won' && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md">
                            <div className="bg-gradient-to-br from-blue-600 to-blue-900 p-12 rounded-3xl border-4 border-yellow-400 text-center shadow-2xl">
                                <h2 className="text-5xl font-black text-yellow-400 mb-6">太棒了！过关！</h2>
                                <p className="text-xl text-blue-100 mb-8">你已成功掌握了这些地理组合！</p>
                                <button onClick={startGame} className="px-10 py-4 bg-yellow-400 text-blue-900 font-bold text-2xl rounded-full shadow-lg">再来一次</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
